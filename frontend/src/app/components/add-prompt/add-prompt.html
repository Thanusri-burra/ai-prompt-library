<h2>Add Prompt</h2>

<form [formGroup]="form" (ngSubmit)="onSubmit()">

  <input formControlName="title" placeholder="Title" />
  <div *ngIf="form.get('title')?.touched && form.get('title')?.invalid">
    Title must be at least 3 characters
  </div>

  <br><br>

  <textarea formControlName="content" placeholder="Content"></textarea>
  <div *ngIf="form.get('content')?.touched && form.get('content')?.invalid">
    Content must be at least 20 characters
  </div>

  <br><br>

  <input type="number" formControlName="complexity" />

  <br><br>

  <button type="submit" [disabled]="form.invalid">
    Add Prompt
  </button>

</form>
